<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume | Yukta Pujari</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            min-height:100vh;
            background:linear-gradient(135deg,#4F46E5,#7C3AED,#EC4899);
            padding:20px;
        }

        .navbar{
            position:fixed;
            top:20px;
            left:50%;
            transform:translateX(-50%);
            display:flex;
            gap:12px;
            background:rgba(255,255,255,0.15);
            backdrop-filter:blur(10px);
            padding:12px 25px;
            border-radius:50px;
            z-index:1000;
        }

        .navbar a{
            text-decoration:none;
            color:white;
            font-weight:600;
            padding:10px 18px;
            border-radius:25px;
        }

        .navbar a:hover{
            background:white;
            color:#4F46E5;
        }

        .container{
            margin-top:120px;
            text-align:center;
            color:white;
        }

        h1{
            font-size:3rem;
            margin-bottom:20px;
        }

        p{
            margin-bottom:30px;
            font-size:1.1rem;
        }

        .btn{
            display:inline-block;
            text-decoration:none;
            background:white;
            color:#4F46E5;
            padding:15px 35px;
            border-radius:30px;
            font-weight:bold;
            margin-bottom:30px;
        }

        iframe{
            width:100%;
            max-width:1000px;
            height:700px;
            border:none;
            border-radius:15px;
        }

        @media(max-width:768px){
            .navbar{
                flex-wrap:wrap;
                width:90%;
                justify-content:center;
            }

            h1{
                font-size:2.2rem;
            }

            iframe{
                height:500px;
            }
        }

    </style>
</head>
<body>

<nav class="navbar">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="skills.html">Skills</a>
    <a href="projects.html">Projects</a>
    <a href="resume.html">Resume</a>
    
</nav>

<div class="container">

    <h1>My Resume</h1>

    <p>
        View or download my resume below.
    </p>

    <a href="resume.pdf" download class="btn">
        📄 Download Resume
    </a>

    <br>

    <iframe src="resume.pdf"></iframe>

</div>

</body>
</html>
