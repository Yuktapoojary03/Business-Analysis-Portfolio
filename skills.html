<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills | Yukta Pujari</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            min-height:100vh;
            background:linear-gradient(135deg,#4F46E5,#7C3AED,#EC4899);
            padding:20px;
        }

        /* Navigation Bar */

        .navbar{
            position:fixed;
            top:20px;
            left:50%;
            transform:translateX(-50%);
            display:flex;
            gap:12px;
            background:rgba(255,255,255,0.15);
            backdrop-filter:blur(10px);
            padding:12px 25px;
            border-radius:50px;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
            z-index:1000;
        }

        .navbar a{
            text-decoration:none;
            color:white;
            font-weight:600;
            padding:10px 18px;
            border-radius:25px;
            transition:0.3s;
        }

        .navbar a:hover{
            background:white;
            color:#4F46E5;
        }

        /* Main Container */

        .container{
            max-width:1100px;
            margin:120px auto 50px;
            color:white;
        }

        h1{
            text-align:center;
            font-size:3rem;
            margin-bottom:40px;
        }

        .skills-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
            gap:25px;
        }

        .skill-card{
            background:rgba(255,255,255,0.15);
            backdrop-filter:blur(10px);
            border-radius:20px;
            padding:25px;
            box-shadow:0 8px 25px rgba(0,0,0,0.2);
        }

        .skill-card h2{
            margin-bottom:20px;
            text-align:center;
        }

        .skill{
            margin-bottom:18px;
        }

        .skill p{
            margin-bottom:8px;
            font-weight:600;
        }

        .progress{
            width:100%;
            height:12px;
            background:rgba(255,255,255,0.2);
            border-radius:20px;
            overflow:hidden;
        }

        .progress-bar{
            height:100%;
            background:white;
            border-radius:20px;
        }

        /* Mobile Responsive */

        @media(max-width:768px){

            .navbar{
                flex-wrap:wrap;
                width:90%;
                justify-content:center;
                top:10px;
                padding:10px;
            }

            .navbar a{
                font-size:14px;
                padding:8px 14px;
            }

            h1{
                font-size:2.2rem;
            }
        }

    </style>
</head>
